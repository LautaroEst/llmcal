
method: "full_ft"
loss_fn: "cross_entropy"
optimizer: "adamw"
learning_rate: 0.0001
weight_decay: 0.0
batch_size: 1
max_epochs: 2
max_steps: -1
accumulate_grad_batches: 8
val_check_interval: 16
checkpoint_frequency: 8 # Every n global_steps = n * batch_size * accumulate_grad_batches = 32
random_state: 734