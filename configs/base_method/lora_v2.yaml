method: "lora"

use_lora_checkpoint: False
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_query: True
lora_key: True
lora_value: True
lora_projection: True
lora_mlp: True
lora_head: True

precision: "bf16-true"
batch_size: 1
accumulate_grad_batches: 64
val_check_interval: 512
max_epochs: 8
max_steps: -1
optimizer: "adamw"
learning_rate: 0.0001
weight_decay: 0.0